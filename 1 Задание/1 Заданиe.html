<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя таблица</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 200vh;
            overflow-x: auto;
        }    
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1000px; 
            background-color: white;
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px 12px;
            border: 1px solid #ccc;
            text-align:center;
        }
        th {
            background-color: #93cfe7;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background-color: #93cfe7;
            font-weight: bold;
        }
        th:first-child {
            z-index: 10;
        }
        tr:nth-child(2n)
        {
             background-color: #f0f0f0;
        }
    </style>
</head>
<body>
<table>
    <thead>
